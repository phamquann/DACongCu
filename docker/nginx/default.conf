server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index trang-chu.html index.html;

  location /api/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /h2-console {
    return 301 /h2-console/;
  }

  location /h2-console/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = / {
    try_files /trang-chu.html =404;
  }

  location = /home {
    try_files /trang-chu.html =404;
  }

  location = /login {
    try_files /figma-bill/login.html =404;
  }

  location = /register {
    try_files /registration.html =404;
  }

  location = /booking {
    try_files /figma-bill/UserBooking.html =404;
  }

  location = /checkout {
    try_files /checkout.html =404;
  }

  location = /product {
    try_files /product-detail.html =404;
  }

  location = /orders/history {
    try_files /order-management.html =404;
  }

  location = /orders/tracking {
    try_files /thong-bao.html =404;
  }

  location = /profile {
    try_files /ho-so.html =404;
  }

  location = /vouchers {
    try_files /figma-bill/voucher.html =404;
  }

  location = /chat {
    try_files /figma-bill/ChatSupport.html =404;
  }

  location = /bill {
    try_files /figma-bill/dat-hang-thanh-cong.html =404;
  }

  location = /bill/success {
    try_files /figma-bill/dat-hang-thanh-cong.html =404;
  }

  location = /bill/suggestions {
    try_files /figma-bill/goi-y-mon-an.html =404;
  }

  location = /bill/invoice {
    try_files /figma-bill/hoa-don-dien-tu.html =404;
  }

  location = /bill/actions {
    try_files /figma-bill/thao-tac-hoa-don.html =404;
  }

  location = /bill/review {
    try_files /figma-bill/danh-gia-don-hang.html =404;
  }

  location = /admin {
    try_files /figma-bill/AdminDashboard.html =404;
  }

  location = /admin/reviews {
    try_files /danh-gia.html =404;
  }

  location = /admin/vouchers {
    try_files /figma-bill/admin-voucher.html =404;
  }

  location / {
    try_files $uri $uri/ =404;
  }
}