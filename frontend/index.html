<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Đồ Ăn Nhanh</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="container">
    <div class="left">
        <h1>ĐẶT ĐỒ ĂN NHANH<br>GIAO HÀNG TẬN NƠI</h1>
        <img src="burger.png" alt="Burger" class="main-img">
        <div class="food-row">
            <img src="chicken.png" alt="Gà rán">
            <img src="pizza.png" alt="Pizza">
            <img src="coke.png" alt="Coca Cola">
        </div>
    </div>
    <div class="right">
        <form id="loginForm">
            <h2>Đăng nhập</h2>
            <input type="text" id="username" placeholder="Nhập email hoặc số điện thoại" required>
            <div class="password-row">
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                <span id="togglePassword">👁️</span>
            </div>
            <div class="row">
                <label><input type="checkbox" id="remember"> Ghi nhớ mật khẩu</label>
                <a href="#" class="forgot">Quên mật khẩu?</a>
            </div>
            <button type="submit">Đăng nhập</button>
            <div class="register">
                Chưa có tài khoản? <a href="#">Đăng ký</a>
            </div>
              <div class="or">Hoặc tiếp tục với</div>
              <div id="g_id_onload"
                  data-client_id="80672838908-g0vdba3n0l1ibo5abn00am3baihronjj.apps.googleusercontent.com"
                  data-callback="handleCredentialResponse"
                  data-auto_prompt="false">
              </div>
              <div class="g_id_signin"
                  data-type="standard"
                  data-size="large"
                  data-theme="outline"
                  data-text="sign_in_with"
                  data-shape="rectangular"
                  data-logo_alignment="left">
              </div>
        </form>
        <div id="loginResult"></div>
    </div>
</div>
<script src="script.js"></script>
</body>
<script>
function handleCredentialResponse(response) {
    // response.credential là ID token
    fetch('http://localhost:8080/api/auth/google', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ idToken: response.credential })
    })
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            document.getElementById('loginResult').style.color = '#388e3c';
            document.getElementById('loginResult').textContent = 'Đăng nhập Google thành công!';
        } else {
            document.getElementById('loginResult').style.color = '#d32f2f';
            document.getElementById('loginResult').textContent = data.message || 'Đăng nhập Google thất bại!';
        }
    })
    .catch(() => {
        document.getElementById('loginResult').style.color = '#d32f2f';
        document.getElementById('loginResult').textContent = 'Không thể kết nối máy chủ!';
    });
}
</script>
</body>
</html>
