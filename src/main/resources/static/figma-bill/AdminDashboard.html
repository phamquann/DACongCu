<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quản lý đặt đồ ăn - Admin Dashboard</title>
    <style>
      * { margin:0; padding:0; box-sizing:border-box; }
      :root {
        --orange:#f97316;
        --gray-light:#f3f4f6;
        --gray-medium:#e5e7eb;
        --yellow:#fcd34d;
        --blue:#60a5fa;
        --green:#4ade80;
        --gray-bg:#d3d3d3;
      }
      body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Roboto",sans-serif; background:linear-gradient(180deg,#fff7ed 0,#f3f4f6 220px); color:#111827; }
      .container-fluid { display:flex; min-height:100vh; }
      .sidebar { width:80px; background-color:var(--orange); display:flex; flex-direction:column; align-items:center; padding:32px 0; gap:32px; position:fixed; left:0; top:0; height:100vh; }
      .sidebar-icon { width:48px; height:48px; border-radius:8px; border:none; display:flex; align-items:center; justify-content:center; font-size:24px; text-decoration:none; color:white; flex-shrink:0; }
      .sidebar-icon.active { background-color:white; color:var(--orange); }
      .sidebar-spacer { flex-grow:1; }
      .main-content { margin-left:80px; flex:1; display:flex; flex-direction:column; min-width:0; }
      .header { background-color:white; padding:24px; display:flex; align-items:center; justify-content:space-between; box-shadow:0 1px 3px rgba(0,0,0,.1); gap:24px; flex-wrap:wrap; }
      .search-container { flex:1; max-width:400px; min-width:240px; position:relative; }
      .search-container input { width:100%; padding:12px 16px 12px 40px; border:1px solid var(--gray-medium); border-radius:8px; font-size:14px; }
      .search-container::before { content:"🔍"; position:absolute; left:12px; top:12px; }
      .header-right { display:flex; align-items:center; gap:24px; }
      .icon-btn { width:40px; height:40px; border:none; background:white; border-radius:8px; font-size:20px; }
      .content { flex:1; overflow-y:auto; padding:24px; min-width:0; }
      .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:24px; margin-bottom:32px; }
      .stat-card { padding:24px; border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.1); }
      .yellow { background-color:var(--yellow); color:#374151; }
      .blue { background-color:var(--blue); color:white; }
      .green { background-color:var(--green); color:white; }
      .gray { background-color:var(--gray-bg); color:#374151; }
      .stat-card h3 { font-size:14px; font-weight:600; margin-bottom:8px; opacity:.9; }
      .stat-card .number { font-size:36px; font-weight:bold; margin-bottom:8px; }
      .table-container { background-color:white; border-radius:12px; box-shadow:0 1px 3px rgba(0,0,0,.1); border-top:4px solid var(--blue); overflow:hidden; }
      .table-header { padding:16px 24px; border-bottom:1px solid var(--gray-medium); display:flex; justify-content:space-between; align-items:center; gap:12px; }
      .table-wrapper { overflow-x:auto; }
      table { width:100%; border-collapse:collapse; }
      thead { background-color:#f9fafb; border-bottom:1px solid var(--gray-medium); }
      thead th { padding:16px 24px; text-align:left; font-size:13px; font-weight:600; color:#6b7280; text-transform:uppercase; letter-spacing:.5px; }
      tbody td { padding:16px 24px; border-bottom:1px solid var(--gray-medium); font-size:14px; color:#374151; }
      tbody tr:hover { background:#fff7ed; }
      .status-badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; white-space:nowrap; }
      .status-pending { background-color:#fef08a; color:#854d0e; }
      .status-preparing { background-color:#dbeafe; color:#1e40af; }
      .status-completed { background-color:#dcfce7; color:#166534; }
      #admin-dashboard-message { font-size:14px; min-height:20px; }
      @media (max-width:900px) {
        .container-fluid { flex-direction:column; }
        .sidebar { width:100%; height:auto; position:static; flex-direction:row; justify-content:space-between; padding:14px 16px; }
        .sidebar-spacer { display:none; }
        .main-content { margin-left:0; }
        .header { padding:18px 20px; }
        .content { padding:20px; }
        .search-container { max-width:none; width:100%; }
      }
      @media (max-width:640px) {
        .sidebar { gap:12px; overflow-x:auto; justify-content:flex-start; }
        .stats-grid { grid-template-columns:1fr; }
        .table-header { flex-direction:column; align-items:flex-start; }
        thead th, tbody td { padding:14px 16px; }
      }
    </style>
  </head>
  <body>
    <div class="container-fluid">
      <aside class="sidebar">
        <a class="sidebar-icon active" href="/admin" title="Trang chủ">🏠</a>
        <a class="sidebar-icon" href="/admin/reviews" title="Đánh giá">💬</a>
        <a class="sidebar-icon" href="/admin/vouchers" title="Voucher">🎟️</a>
        <div class="sidebar-spacer"></div>
        <a class="sidebar-icon" href="/booking" title="Về user">☰</a>
      </aside>

      <main class="main-content">
        <header class="header">
          <div class="search-container">
            <input id="admin-dashboard-search" type="text" placeholder="Tìm mã đơn, khách hàng hoặc món ăn..." />
          </div>
          <div class="header-right">
            <button class="icon-btn">🔔</button>
            <button class="icon-btn">👤</button>
          </div>
        </header>

        <div class="content">
          <div class="stats-grid">
            <div class="stat-card yellow"><h3>Đơn chờ xác nhận</h3><div class="number" id="admin-stat-placed">0</div><div class="subtitle">Cần xử lý</div></div>
            <div class="stat-card blue"><h3>Đơn đang chuẩn bị</h3><div class="number" id="admin-stat-preparing">0</div><div class="subtitle">Bếp đang xử lý</div></div>
            <div class="stat-card green"><h3>Đơn đã hoàn tất</h3><div class="number" id="admin-stat-delivered">0</div><div class="subtitle">Hoàn thành</div></div>
            <div class="stat-card gray"><h3>Lịch đặt trước</h3><div class="number" id="admin-stat-scheduled">0</div><div class="subtitle">Đơn có hẹn giờ</div></div>
          </div>

          <div class="table-container">
            <div class="table-header">
              <h2>Danh sách đơn hàng</h2>
              <p id="admin-dashboard-message"></p>
            </div>
            <div class="table-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>Mã đơn</th>
                    <th>Tên khách hàng</th>
                    <th>Thời gian</th>
                    <th>Món ăn</th>
                    <th>Trạng thái</th>
                  </tr>
                </thead>
                <tbody id="admin-dashboard-table-body">
                  <tr><td colspan="5">Đang tải dữ liệu...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="../js/common.js"></script>
    <script src="../js/admin.js"></script>
  </body>
</html>
