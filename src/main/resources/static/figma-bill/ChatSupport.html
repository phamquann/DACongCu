<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat hỗ trợ - Food Delivery</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      :root {
        --orange: #f97316;
        --gray-medium: #e5e7eb;
        --gray-dark: #6b7280;
      }
      body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Roboto", sans-serif; background-color: #f3f4f6; min-height: 100vh; }
      .chat-container { display: flex; min-height: 100vh; background-color: white; }
      .chat-sidebar { width: 320px; background-color: white; border-right: 1px solid var(--gray-medium); display: flex; flex-direction: column; }
      .chat-sidebar-header { padding: 24px; border-bottom: 1px solid var(--gray-medium); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
      .chat-sidebar-header h2 { font-size: 24px; font-weight: 700; color: #111827; }
      .add-chat-btn { width: 40px; height: 40px; border: none; background-color: white; border-radius: 8px; color: var(--orange); display: inline-flex; align-items: center; justify-content: center; text-decoration: none; }
      .chat-list { flex: 1; overflow-y: auto; padding: 8px 0; }
      .chat-item { padding: 12px 16px; border-bottom: 1px solid #f3f4f6; cursor: pointer; display: flex; align-items: center; gap: 12px; border-left: 4px solid transparent; }
      .chat-item:hover { background-color: #fff7ed; }
      .chat-item.active { background-color: #fef3f2; border-left-color: var(--orange); }
      .chat-avatar, .chat-header-avatar { width: 48px; height: 48px; border-radius: 50%; background: linear-gradient(135deg, #fb923c, #f97316); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 18px; flex-shrink: 0; }
      .chat-info { flex: 1; min-width: 0; }
      .chat-name { font-weight: 700; color: #111827; font-size: 14px; margin-bottom: 4px; }
      .chat-status { display: flex; align-items: center; gap: 4px; font-size: 12px; }
      .status-dot { width: 6px; height: 6px; background-color: #10b981; border-radius: 50%; }
      .chat-last-msg { color: var(--gray-dark); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
      .chat-content { flex: 1; display: flex; flex-direction: column; background-color: white; min-width: 0; }
      .chat-header { padding: 16px 24px; border-bottom: 1px solid var(--gray-medium); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
      .chat-header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
      .chat-header-info h3 { font-size: 18px; font-weight: 700; color: #111827; }
      .chat-header-status { font-size: 12px; color: #10b981; font-weight: 700; margin-top: 2px; }
      .messages-area { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; background: linear-gradient(180deg, #ffffff, #fafafa); }
      .message-group { display: flex; }
      .message-group.user { justify-content: flex-end; }
      .message-group.shipper { justify-content: flex-start; }
      .message-bubble { max-width: 60%; padding: 12px 16px; border-radius: 8px; font-size: 14px; word-wrap: break-word; box-shadow: 0 1px 3px rgba(0,0,0,.1); }
      .message-group.user .message-bubble { background-color: #1f2937; color: white; border-bottom-right-radius: 2px; }
      .message-group.shipper .message-bubble { background-color: #e5e7eb; color: #111827; border-bottom-left-radius: 2px; }
      .message-time { font-size: 11px; margin-top: 4px; opacity: .7; }
      .input-area { background-color: var(--orange); padding: 16px 24px; display: flex; align-items: flex-end; gap: 12px; }
      .input-btn, .send-btn { width: 40px; height: 40px; border: none; cursor: pointer; display:flex; align-items:center; justify-content:center; }
      .input-btn { background-color: transparent; color: white; font-size: 20px; }
      .message-input-wrapper { flex: 1; display: flex; align-items: center; background-color: white; border-radius: 20px; padding: 0 16px; min-width: 0; }
      .message-input-wrapper input { flex: 1; border: none; outline: none; padding: 12px 0; font-size: 14px; min-width: 0; }
      .send-btn { background-color: white; color: var(--orange); border-radius: 50%; font-weight: 700; }
      #chat-message { padding: 10px 24px 0; font-size: 14px; }
      @media (max-width: 768px) {
        .chat-container { flex-direction: column; min-height: 100vh; }
        .chat-sidebar { width:100%; max-height:260px; }
        .chat-header, .chat-sidebar-header { padding: 18px; }
        .input-area { padding: 14px 18px; flex-wrap: wrap; }
        .message-bubble { max-width: 85%; }
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <aside class="chat-sidebar">
        <div class="chat-sidebar-header">
          <h2>Chat</h2>
          <a class="add-chat-btn" href="/orders/tracking">↩</a>
        </div>
        <div class="chat-list" id="chat-list"></div>
      </aside>

      <main class="chat-content">
        <header class="chat-header">
          <div class="chat-header-left">
            <div class="chat-header-avatar" id="chat-header-avatar">S</div>
            <div class="chat-header-info">
              <h3 id="chat-header-title">Đang tải...</h3>
              <div class="chat-header-status" id="chat-header-status">Kết nối hội thoại</div>
            </div>
          </div>
          <a class="add-chat-btn" href="/orders/history">📋</a>
        </header>

        <div class="messages-area" id="chat-messages"></div>
        <p id="chat-message"></p>

        <div class="input-area">
          <button class="input-btn" title="Đính kèm">📎</button>
          <button class="input-btn" title="Chụp ảnh">📷</button>
          <div class="message-input-wrapper">
            <input type="text" placeholder="Nhập tin nhắn..." id="messageInput" />
          </div>
          <button class="send-btn" id="chat-send-btn" title="Gửi">➤</button>
        </div>
      </main>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/user-shortcuts.js"></script>
    <script src="/js/chat.js"></script>
  </body>
</html>
