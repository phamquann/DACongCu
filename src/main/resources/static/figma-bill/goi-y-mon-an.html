<!doctype html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gợi ý món ăn</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/figma-bill/style.css">
</head>
<body>
  <div class="artboard">
    <header class="app-header">
      <div class="brand-wrap">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-text">Đặt hàng thành công</span>
      </div>
      <nav class="top-nav" aria-label="Điều hướng màn hình">
        <a href="/bill/success">Đặt hàng</a>
        <a class="active" href="/bill/suggestions">Gợi ý món</a>
        <a href="/bill/invoice">Hóa đơn</a>
        <a href="/bill/actions">Thao tác</a>
        <a href="/bill/review">Đánh giá</a>
      </nav>
      <label class="search-box" aria-label="Tìm kiếm">
        <input type="text" placeholder="Search in idea" disabled>
      </label>
    </header>

    <main>
      <section class="screen active">
        <div class="suggest-layout">
          <div class="suggest-title-wrap">
            <h2>Hôm nay ăn gì?</h2>
          </div>
          <div id="suggestion-list" class="suggest-cards"></div>
        </div>

        <div class="support-row">
          <div class="user-chip">
            <span class="avatar" aria-hidden="true">👤</span>
            <div>
              <strong id="customer-chip-name">John Doe</strong>
              <p>Bạn hôm nay cần tư vấn thực đơn gì?</p>
            </div>
          </div>
          <button class="pill-btn">Lịch sử hỗ trợ</button>
        </div>
      </section>
    </main>
  </div>

  <script src="/figma-bill/script.js"></script>
</body>
</html>
