<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Đặt đồ ăn nhanh</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Reset cơ bản để đảm bảo hiển thị giống nhau trên các trình duyệt */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f5f5; /* Màu nền xám nhạt cho toàn trang */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Container chính chứa 2 cột */
        .login-container {
            display: flex;
            width: 1000px;
            max-width: 100%;
            height: 600px;
            background-color: #fff;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            overflow: hidden; /* Bo góc cả phần ảnh bên trong */
        }

        /* Phần Banner bên trái (chứa ảnh đồ ăn) */
        .login-banner {
            flex: 1;
            background-color: #f39c12; /* Màu nền cam fallback nếu ảnh chưa load */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .banner-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Đảm bảo ảnh phủ kín khung mà không bị méo */
        }

        /* Phần Form đăng nhập bên phải */
        .login-form-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
        }

        .form-wrapper {
            width: 100%;
            max-width: 350px;
        }

        .form-wrapper h2 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            color: #333;
        }

        /* Cấu trúc các ô Input có icon */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 40px; /* Chừa khoảng trống 40px bên trái cho icon */
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            border-color: #e67e22; /* Màu viền khi click vào ô input */
        }

        /* Định vị Icon bên trong ô input */
        .icon-left {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
        }

        .icon-right {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #888;
            cursor: pointer; /* Icon con mắt có thể click */
        }

        /* Tùy chọn Ghi nhớ & Quên mật khẩu */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
            color: #555;
        }

        .remember-me {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .remember-me input {
            margin-right: 8px;
        }

        .forgot-password {
            color: #e67e22;
            text-decoration: none;
        }

        /* Nút Đăng nhập chính */
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #e67e22; /* Màu cam chính */
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-bottom: 15px;
        }

        .btn-login:hover {
            background-color: #d35400; /* Màu cam đậm hơn khi di chuột qua */
        }

        /* Dòng chuyển hướng Đăng ký */
        .register-link {
            text-align: center;
            margin-bottom: 20px;
            font-size: 14px;
            color: #555;
        }

        .register-link a {
            color: #e67e22;
            text-decoration: none;
            font-weight: bold;
        }

        /* Dải phân cách "Hoặc tiếp tục với" */
        .divider {
            text-align: center;
            margin: 20px 0;
            position: relative;
        }

        .divider::before, .divider::after {
            content: "";
            position: absolute;
            top: 50%;
            width: 30%;
            height: 1px;
            background-color: #ccc;
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .divider span {
            font-size: 13px;
            color: #666;
            background: #fff; /* Nền trắng đè lên đường kẻ */
            padding: 0 10px;
            position: relative;
            z-index: 1;
        }

        /* Nút đăng nhập Google */
        .btn-google {
            width: 100%;
            padding: 10px;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 20px; /* Bo góc tròn hơn */
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 15px;
            cursor: pointer;
            font-weight: 500;
            color: #555;
            transition: background-color 0.3s;
        }

        .btn-google:hover {
            background-color: #f9f9f9;
        }

        #login-message {
            margin-top: 12px;
            min-height: 20px;
            font-size: 14px;
            text-align: center;
            color: #b42318;
        }

        /* Thêm CSS cho logo Google */
        .google-img {
            width: 20px;
            margin-right: 10px;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-banner">
        <img th:src="@{/images/DOANNHAMJ.jpg}" alt="Fast Food Banner" class="banner-img" src="/images/DOANNHAMJ.jpg">
    </div>

    <div class="login-form-section">
        <div class="form-wrapper">
            <h2>Đăng nhập</h2>
            
            <form id="login-form" th:action="@{/login}" method="post">
                <div class="input-group">
                    <i class="fa-solid fa-circle-info icon-left"></i>
                    <input type="text" name="username" placeholder="Nhập email hoặc số điện thoại" required>
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock icon-left"></i>
                    <input type="password" name="password" placeholder="Nhập mật khẩu" required>
                    <i class="fa-solid fa-eye icon-right"></i>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" name="remember-me"> Ghi nhớ mật khẩu
                    </label>
                    <a href="#" class="forgot-password">Quên mật khẩu?</a>
                </div>

                <button type="submit" class="btn-login">Đăng nhập</button>
                <p id="login-message"></p>

                <div class="register-link">
                    Chưa có tài khoản? <a href="/register">Đăng ký</a>
                </div>

                <div class="divider">
                    <span>Hoặc tiếp tục với</span>
                </div>

                <button type="button" class="btn-google">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" class="google-img">
                    Google
                </button>
            </form>
        </div>
    </div>
</div>

<script src="/js/common.js"></script>
<script src="/js/auth.js"></script>
</body>
</html>
