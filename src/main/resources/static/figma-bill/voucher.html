<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ưu đãi hấp dẫn - Voucher</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #fffaf5; color: #333; }
        .voucher-banner { background-color: #f97316; color: white; text-align: center; padding: 40px 20px; }
        .voucher-banner h1 { font-size: 32px; margin-bottom: 15px; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .voucher-banner p { font-size: 18px; font-weight: 400; }
        .filter-container { display: flex; justify-content: center; gap: 15px; margin: 30px 0; flex-wrap: wrap; padding: 0 20px; }
        .filter-btn { background-color: white; border: 1px solid #ddd; padding: 10px 20px; border-radius: 30px; font-size: 16px; font-weight: 500; color: #333; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .filter-btn.active { background-color: #f97316; color: white; border-color: #f97316; }
        .voucher-container { max-width: 1200px; margin: 0 auto; padding: 0 20px 50px 20px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
        .voucher-card { background-color: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08); display: flex; flex-direction: column; transition: transform 0.3s; }
        .voucher-card:hover { transform: translateY(-5px); }
        .card-image { position: relative; height: 180px; padding: 15px; display: flex; justify-content: center; align-items: center; }
        .card-image img { width: 100%; height: 100%; object-fit: contain; }
        .discount-badge { position: absolute; top: 15px; right: 15px; background-color: #ef4444; color: white; padding: 4px 10px; border-radius: 20px; font-size: 14px; font-weight: bold; }
        .card-content { padding: 15px; display: flex; flex-direction: column; flex: 1; }
        .card-title { font-size: 18px; font-weight: 600; margin-bottom: 5px; }
        .card-desc { font-size: 13px; color: #666; margin-bottom: 15px; line-height: 1.4; }
        .card-conditions { font-size: 12px; color: #555; margin-bottom: 15px; }
        .card-conditions p { margin-bottom: 5px; display: flex; align-items: center; gap: 8px; }
        .card-action { display: flex; gap: 10px; margin-top: auto; }
        .promo-code { flex: 1; background-color: #f97316; color: white; text-align: center; padding: 8px; border-radius: 6px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .btn-copy { background-color: white; border: 2px solid #f97316; color: #f97316; border-radius: 6px; width: 36px; display: flex; justify-content: center; align-items: center; cursor: pointer; }
        @media (max-width: 992px) { .voucher-container { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 576px) { .voucher-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="voucher-banner">
        <h1><i class="fa-solid fa-ticket"></i> Ưu đãi hấp dẫn</h1>
        <p>Khám phá các voucher giảm giá độc quyền cho đồ ăn nhanh yêu thích của bạn</p>
    </header>

    <div class="filter-container">
        <button class="filter-btn active" data-category-code=""><i class="fa-solid fa-border-all"></i> Tất cả</button>
        <button class="filter-btn" data-category-code="BURGER"><i class="fa-solid fa-burger"></i> Burger</button>
        <button class="filter-btn" data-category-code="PIZZA"><i class="fa-solid fa-pizza-slice"></i> Pizza</button>
        <button class="filter-btn" data-category-code="FRIED_CHICKEN"><i class="fa-solid fa-drumstick-bite"></i> Gà rán</button>
        <button class="filter-btn" data-category-code="COMBO"><i class="fa-solid fa-box"></i> Combo</button>
    </div>

    <div id="voucher-list" class="voucher-container">
        <p>Đang tải voucher...</p>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/vouchers.js"></script>
</body>
</html>
