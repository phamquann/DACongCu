<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastFood - Hồ sơ người dùng</title>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/thong-bao.css">
</head>
<body>
    <div class="page full-width">
        <div class="column column-right" style="max-width: 100%;">
            <div class="profile-card">
                <div class="brand-bar">MinhQuanFood</div>
                <div class="profile-body">
                    <div class="profile-left">
                        <div class="avatar large">PQ</div>
                        <p class="name">Phạm Quân</p>
                        <nav class="side-nav">
                            <a class="nav-item active"><i class="fa-regular fa-address-card"></i> Hồ sơ</a>
                            <a class="nav-item"><i class="fa-regular fa-file-lines"></i> Đơn hàng</a>
                            <a class="nav-item"><i class="fa-regular fa-heart"></i> Yêu thích</a>
                            <a class="nav-item"><i class="fa-regular fa-map"></i> Địa chỉ</a>
                        </nav>
                    </div>

                    <div class="profile-right">
                        <div class="info-card compact">
                            <div class="info-head">
                                <p class="label">Thông tin cá nhân</p>
                                <a href="#" class="edit-link"><i class="fa-regular fa-pen-to-square"></i> Chỉnh sửa</a>
                            </div>
                            <div class="form-grid">
                                <label>
                                    <span>Họ và tên</span>
                                    <input type="text" placeholder="Phạm Quân" disabled>
                                </label>
                                <label>
                                    <span>Email</span>
                                    <input type="text" placeholder="quan@email.com" disabled>
                                </label>
                                <label>
                                    <span>Số điện thoại</span>
                                    <input type="text" placeholder="0909 999 999" disabled>
                                </label>
                                <label>
                                    <span>Ngày sinh</span>
                                    <input type="text" placeholder="12/03/1996" disabled>
                                </label>
                            </div>
                        </div>
                        <div class="stats">
                            <div class="stat-tile mint"></div>
                            <div class="stat-tile green"></div>
                            <div class="stat-tile blue"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
