<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đặt Đồ Ăn Nhanh</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div class="left">
        <h1>ĐẶT ĐỒ ĂN NHANH<br>GIAO HÀNG TẬN NƠI</h1>
        <img src="burger.png" alt="Burger" class="main-img">
        <div class="food-row">
            <img src="chicken.png" alt="Gà rán">
            <img src="pizza.png" alt="Pizza">
            <img src="coke.png" alt="Coca Cola">
        </div>
    </div>
    <div class="right">
        <form id="loginForm">
            <h2>Đăng nhập</h2>
            <input type="text" id="username" placeholder="Nhập email hoặc số điện thoại" required>
            <div class="password-row">
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                <span id="togglePassword">👁️</span>
            </div>
            <div class="row">
                <label><input type="checkbox" id="remember"> Ghi nhớ mật khẩu</label>
                <a href="#" class="forgot" id="forgotPasswordLink">Quên mật khẩu?</a>
            </div>
            <button type="submit">Đăng nhập</button>
            <div class="register">
                Chưa có tài khoản? <a href="#">Đăng ký</a>
            </div>
            <div class="or">Hoặc tiếp tục với</div>
            <button type="button" class="google-btn" id="googleSignInBtn">Google</button>
        </form>
        <div id="loginResult"></div>
        <!-- Modal Quên mật khẩu -->
        <div id="forgotModal" class="modal" style="display:none;position:fixed;z-index:1000;left:0;top:0;width:100vw;height:100vh;background:rgba(0,0,0,0.3);align-items:center;justify-content:center;">
            <div style="background:#fff;padding:24px 20px;border-radius:12px;min-width:300px;max-width:90vw;box-shadow:0 2px 16px #ff980033;position:relative;">
                <h3>Quên mật khẩu</h3>
                <p>Nhập email để nhận hướng dẫn đặt lại mật khẩu:</p>
                <input type="email" id="forgotEmail" placeholder="Nhập email" style="width:100%;padding:8px 10px;margin-bottom:12px;border-radius:6px;border:1px solid #ddd;">
                <div id="forgotResult" style="color:#d32f2f;font-size:0.98rem;min-height:20px;"></div>
                <div style="display:flex;gap:10px;justify-content:flex-end;">
                    <button id="forgotSendBtn" style="background:#ff9800;color:#fff;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;">Gửi</button>
                    <button id="forgotCloseBtn" style="background:#eee;color:#333;border:none;padding:8px 18px;border-radius:6px;cursor:pointer;">Đóng</button>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="script.js"></script>
</body>
</html>
