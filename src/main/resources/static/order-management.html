<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch sử đơn hàng - FoodHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(180deg, #fff7ed 0, #f5f5f5 220px); color: #333; }
        .wrapper { display: flex; min-height: 100vh; }
        .sidebar { width: 250px; background: #ff8c00; color: white; padding: 20px 0; }
        .sidebar-header { padding: 15px 20px; font-size: 18px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); margin-bottom: 15px; }
        .sidebar-menu { list-style: none; display: flex; flex-direction: column; gap: 6px; }
        .sidebar-item { padding: 15px 20px; display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; border-left: 3px solid transparent; }
        .sidebar-item.active { background: rgba(0,0,0,0.15); border-left-color: white; }
        .main-content { flex: 1; padding: 30px; min-width: 0; }
        .container { background: white; border-radius: 16px; box-shadow: 0 18px 45px rgba(0,0,0,0.12); overflow: hidden; }
        .header { background: white; padding: 25px; border-bottom: 1px solid #f0f0f0; }
        .header-title { font-size: 28px; font-weight: bold; color: #333; }
        .header-subtitle { font-size: 13px; color: #999; margin-top: 5px; }
        .content { padding: 25px; display: grid; gap: 20px; }
        .order-card { border: 1px solid #f0f0f0; border-radius: 12px; padding: 20px; background: #fafafa; }
        .order-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px solid #e0e0e0; }
        .order-id { font-weight: bold; color: #333; margin-bottom: 5px; }
        .order-status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; margin-left: 8px; }
        .status-processing { background: #fff3cd; color: #ff8c00; }
        .status-confirmed { background: #d1ecf1; color: #0c5460; }
        .status-delivered { background: #d4edda; color: #155724; }
        .order-details { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 20px; }
        .detail-item { display: flex; align-items: flex-start; gap: 10px; min-width: 0; }
        .detail-label { font-size: 12px; color: #999; text-transform: uppercase; margin-bottom: 4px; }
        .detail-value { font-size: 13px; color: #333; line-height: 1.4; }
        .order-items, .order-timeline, .order-summary { background: white; padding: 15px; border-radius: 4px; margin-bottom: 15px; }
        .order-items-title, .timeline-title { font-size: 13px; font-weight: bold; color: #333; margin-bottom: 12px; }
        .item-row, .summary-row { display: flex; justify-content: space-between; gap: 12px; font-size: 12px; color: #666; padding: 8px 0; border-bottom: 1px solid #f0f0f0; }
        .item-row:last-child, .summary-row:last-child { border-bottom: none; }
        .summary-row.total { font-weight: bold; color: #333; padding-top: 10px; border-top: 1px solid #f0f0f0; }
        .summary-price { font-weight: bold; color: #ff8c00; }
        .timeline-item { display: flex; gap: 15px; margin-bottom: 15px; position: relative; }
        .timeline-item:not(:last-child)::after { content: ""; position: absolute; left: 8px; top: 35px; width: 2px; height: 30px; background: #e0e0e0; }
        .timeline-dot { width: 18px; height: 18px; background: #e0e0e0; border-radius: 50%; margin-top: 3px; flex-shrink: 0; }
        .timeline-dot.completed { background: #4caf50; }
        .timeline-dot.active { background: #ff8c00; box-shadow: 0 0 0 3px rgba(255, 140, 0, 0.2); }
        .order-actions { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; }
        .action-btn { flex: 1; min-width: 140px; padding: 10px; border: 1px solid #ddd; border-radius: 4px; background: white; color: #333; font-size: 12px; font-weight: bold; cursor: pointer; }
        .action-btn.primary { background: #ff8c00; color: white; border-color: #ff8c00; }
        @media (max-width: 1024px) { .order-details { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 768px) {
            .wrapper { flex-direction: column; }
            .sidebar { width: 100%; }
            .sidebar-menu { flex-direction: row; overflow-x: auto; padding: 0 12px 8px; }
            .sidebar-item { flex: 0 0 auto; border-left: none; border-bottom: 3px solid transparent; border-radius: 10px; }
            .sidebar-item.active { border-bottom-color: white; }
            .main-content { padding: 15px; }
            .order-header { flex-direction: column; }
            .order-details { grid-template-columns: 1fr; }
            .item-row { flex-direction: column; gap: 4px; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="sidebar">
            <div class="sidebar-header">FoodHub</div>
            <ul class="sidebar-menu">
                <li><a class="sidebar-item" href="/booking">🍽️ Đặt món</a></li>
                <li><a class="sidebar-item active" href="/orders/history">📋 Đơn hàng</a></li>
                <li><a class="sidebar-item" href="/orders/tracking">🚚 Theo dõi</a></li>
                <li><a class="sidebar-item" href="/vouchers">🎁 Ưu đãi</a></li>
                <li><a class="sidebar-item" href="/profile">👤 Hồ sơ</a></li>
            </ul>
        </div>

        <div class="main-content">
            <div class="container">
                <div class="header">
                    <div class="header-title">Lịch sử đơn hàng</div>
                    <div class="header-subtitle">Theo dõi trạng thái, hóa đơn và đánh giá của từng đơn.</div>
                </div>
                <div class="content" id="orders-history-list">
                    <p>Đang tải danh sách đơn hàng...</p>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/user-shortcuts.js"></script>
    <script src="/js/orders.js"></script>
</body>
</html>
