<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiet san pham - FoodHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1f2937, #111827 55%);
            color: #111827;
            padding: 24px 14px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .phone-frame {
            width: 100%;
            max-width: 360px;
            min-height: 640px;
            background: #f8fafc;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 22px 45px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
        }
        .top-bar {
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn, .icon-btn {
            width: 34px;
            height: 34px;
            border: none;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #111827;
            text-decoration: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.12);
            font-size: 16px;
        }
        .top-actions { display: flex; gap: 8px; }
        .content { padding: 6px 16px 16px; display: flex; flex-direction: column; flex: 1; }
        .cover {
            width: 100%;
            aspect-ratio: 4 / 3;
            object-fit: cover;
            border-radius: 10px;
            background: #e5e7eb;
        }
        .name-row {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            align-items: flex-start;
        }
        .name {
            font-size: 18px;
            font-weight: 700;
            line-height: 1.3;
        }
        .price {
            font-size: 18px;
            font-weight: 800;
            color: #111827;
            white-space: nowrap;
        }
        .desc {
            margin-top: 8px;
            color: #6b7280;
            font-size: 13px;
            line-height: 1.5;
            min-height: 40px;
        }
        .message {
            margin-top: 8px;
            min-height: 20px;
            font-size: 13px;
            font-weight: 700;
        }
        .spacer { flex: 1; }
        .qty-wrap {
            margin-top: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
        }
        .qty-btn {
            width: 28px;
            height: 28px;
            border: none;
            border-radius: 50%;
            background: #86efac;
            color: #166534;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }
        .qty {
            min-width: 24px;
            text-align: center;
            font-size: 16px;
            font-weight: 700;
            color: #111827;
        }
        .cta {
            margin-top: 14px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #22c55e;
            color: white;
            font-size: 14px;
            font-weight: 700;
            padding: 11px 12px;
            cursor: pointer;
        }
        .cta:hover { background: #16a34a; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="top-bar">
            <a href="/booking" class="back-btn" aria-label="Quay lai">&#8592;</a>
            <div class="top-actions">
                <a href="/orders/history" class="icon-btn" title="Lich su" aria-label="Lich su">&#128196;</a>
                <a href="/orders/tracking" class="icon-btn" title="Theo doi" aria-label="Theo doi">&#128666;</a>
                <a href="/profile" class="icon-btn" title="Ho so" aria-label="Ho so">&#128100;</a>
                <button id="product-logout-btn" class="icon-btn" type="button" title="Dang xuat" aria-label="Dang xuat">&#10162;</button>
            </div>
        </div>

        <div class="content">
            <img id="product-image" class="cover" alt="San pham">

            <div class="name-row">
                <h1 id="product-name" class="name">Dang tai san pham...</h1>
                <div id="product-price" class="price">0d</div>
            </div>

            <p id="product-desc" class="desc"></p>
            <p id="product-message" class="message"></p>

            <div class="spacer"></div>

            <div class="qty-wrap">
                <button id="qty-minus" class="qty-btn" type="button">-</button>
                <div id="qty-value" class="qty">1</div>
                <button id="qty-plus" class="qty-btn" type="button">+</button>
            </div>

            <button id="add-cart-btn" class="cta" type="button">Them vao gio hang - 0d</button>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/user-shortcuts.js"></script>
    <script src="/js/product-detail.js"></script>
</body>
</html>
