<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Theo dõi đơn hàng - FoodHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: linear-gradient(180deg, #fff7ed 0, #f5f5f5 220px); color: #333; }
        .wrapper { max-width: 980px; margin: 0 auto; padding: 24px 16px; }
        .card { background: #fff; border-radius: 16px; box-shadow: 0 18px 45px rgba(0,0,0,0.12); overflow: hidden; }
        .header { padding: 22px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; gap: 12px; flex-wrap: wrap; }
        .header h1 { font-size: 24px; }
        .pill { background: #fff3cd; color: #9a6700; padding: 6px 12px; border-radius: 999px; font-weight: 700; }
        .section { padding: 20px 22px; border-bottom: 1px solid #f1f1f1; }
        .section:last-child { border-bottom: none; }
        .recipient-grid, .total-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
        .label { color: #666; font-size: 13px; }
        .value { font-weight: 700; margin-top: 4px; }
        .progress { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 8px; }
        .step { text-align: center; background: #f5f5f5; border-radius: 12px; padding: 12px 8px; color: #888; font-size: 13px; }
        .step .step-icon { display: block; font-size: 20px; margin-bottom: 6px; }
        .step.active { background: #fff3e6; color: #f97316; font-weight: 700; }
        .step.completed { background: #e8f8ef; color: #15803d; }
        .items { display: grid; gap: 10px; }
        .item-row { display: flex; justify-content: space-between; gap: 12px; padding: 10px 12px; background: #fafafa; border-radius: 10px; }
        .actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .btn { border: none; border-radius: 10px; padding: 10px 14px; font-weight: 700; cursor: pointer; }
        .btn.primary { background: #f97316; color: #fff; }
        .btn.danger { background: #dc2626; color: #fff; }
        .btn.ghost { background: #fff; border: 1px solid #ddd; }
        #tracking-message { padding: 0 22px 20px; min-height: 20px; font-size: 14px; }
        @media (max-width: 768px) {
            .wrapper { padding: 14px; }
            .recipient-grid, .total-grid { grid-template-columns: 1fr; }
            .progress { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="card">
            <div class="header">
                <div>
                    <h1>Theo dõi đơn hàng</h1>
                    <p id="tracking-order-code" style="margin-top:6px;color:#666;">Mã đơn: --</p>
                </div>
                <div class="pill" id="tracking-status-pill">--</div>
            </div>

            <div class="section">
                <h2 style="font-size:18px;margin-bottom:12px;">Tiến trình giao hàng</h2>
                <div id="tracking-progress" class="progress"></div>
            </div>

            <div class="section recipient-grid">
                <div>
                    <div class="label">Người nhận</div>
                    <div class="value" id="tracking-recipient-name">--</div>
                </div>
                <div>
                    <div class="label">Số điện thoại</div>
                    <div class="value" id="tracking-recipient-phone">--</div>
                </div>
                <div style="grid-column: 1 / -1;">
                    <div class="label">Địa chỉ giao hàng</div>
                    <div class="value" id="tracking-recipient-address">--</div>
                </div>
                <div>
                    <div class="label">Thanh toán</div>
                    <div class="value" id="tracking-payment-method">--</div>
                </div>
            </div>

            <div class="section">
                <h2 style="font-size:18px;margin-bottom:12px;">Món đã đặt</h2>
                <div id="tracking-items" class="items"></div>
            </div>

            <div class="section total-grid">
                <div>
                    <div class="label">Tạm tính</div>
                    <div class="value" id="tracking-subtotal">0đ</div>
                </div>
                <div>
                    <div class="label">Phí giao</div>
                    <div class="value" id="tracking-shipping">0đ</div>
                </div>
                <div>
                    <div class="label">Tổng cộng</div>
                    <div class="value" id="tracking-total">0đ</div>
                </div>
            </div>

            <div class="section">
                <div class="actions">
                    <button id="tracking-chat-btn" class="btn ghost" type="button">Nhắn hỗ trợ</button>
                    <button id="tracking-cancel-btn" class="btn danger" type="button">Hủy đơn</button>
                    <a href="/orders/history" class="btn primary" style="text-decoration:none;display:inline-flex;align-items:center;">Xem lịch sử đơn</a>
                </div>
            </div>

            <p id="tracking-message"></p>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script src="/js/tracking.js"></script>
</body>
</html>
