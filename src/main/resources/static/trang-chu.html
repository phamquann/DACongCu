<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastFood - Trang chủ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/trang-chu.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fa-solid fa-utensils"></i> FastFood
            </div>
            <ul class="nav-links">
                <li><a href="#" class="active">Đồ ăn</a></li>
                <li><a href="#">Thực phẩm</a></li>
                <li><a href="#">Rượu bia</a></li>
                <li><a href="#">Hoa</a></li>
                <li><a href="#">Siêu thị</a></li>
                <li><a href="#">Thú cưng</a></li>
            </ul>
            <div class="nav-actions">
                <button class="icon-btn-search"><i class="fa-solid fa-magnifying-glass"></i></button>
                <button class="btn-login">Đăng nhập</button>
            </div>
        </div>
    </nav>

    <!-- Main Hero Banner -->
    <main class="hero-section">
        <div class="hero-content">
            <!-- Left Side Search -->
            <div class="search-box-large">
                <input type="text" placeholder="Tìm món ăn, địa điểm...">
                <button class="btn-search-primary">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <!-- Right Side Food Menu Container -->
            <div class="food-menu-card">
                <div class="menu-card-header">
                    <div class="location-picker">
                        <span class="highlight">Đồ ăn</span> <i class="fa-solid fa-chevron-right separator"></i> Chọn địa chỉ giao hàng
                    </div>
                    <i class="fa-solid fa-chevron-right arrow-end"></i>
                </div>
                
                <div class="menu-subheader">
                    <h3>Đồ ăn / Đồ ăn</h3>
                    <a href="#" class="view-all">Xem tất cả <i class="fa-solid fa-chevron-right"></i></a>
                </div>

                <div class="food-grid">
                    <!-- Item 1 -->
                    <div class="food-item">
                        <div class="img-wrapper">
                            <span class="discount-badge">Giảm<br>40%</span>
                            <img src="images/fast_food_combo_1775239978559.png" alt="Gà Rán">
                        </div>
                        <p class="food-name">Gà Rán - Gà Bay</p>
                    </div>
                    <!-- Item 2 -->
                    <div class="food-item">
                        <div class="img-wrapper">
                            <img src="images/fast_food_combo_1775239978559.png" alt="Trà sữa">
                        </div>
                        <p class="food-name">Trà sữa - Trân châu</p>
                    </div>
                    <!-- Item 3 -->
                    <div class="food-item">
                        <div class="img-wrapper">
                            <img src="images/fast_food_combo_1775239978559.png" alt="Khai vị">
                        </div>
                        <p class="food-name">Khai vị - Đồ Ăn...</p>
                    </div>
                    <!-- Item 4 -->
                    <div class="food-item">
                        <div class="img-wrapper">
                            <span class="discount-badge">Giảm<br>60k</span>
                            <img src="images/fast_food_combo_1775239978559.png" alt="Cơm trưa">
                        </div>
                        <p class="food-name">Cơm trưa - Gà Xối...</p>
                    </div>
                    <!-- Item 5 -->
                    <div class="food-item">
                        <div class="img-wrapper">
                            <img src="images/fast_food_combo_1775239978559.png" alt="Thịt nướng">
                        </div>
                        <p class="food-name">Thịt Nướng - Hàn...</p>
                    </div>
                    <!-- Item 6 -->
                    <div class="food-item">
                        <div class="img-wrapper">
                            <span class="discount-badge">Giảm<br>10%</span>
                            <img src="images/fast_food_combo_1775239978559.png" alt="Tráng miệng">
                        </div>
                        <p class="food-name">Tráng miệng - Bánh...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
